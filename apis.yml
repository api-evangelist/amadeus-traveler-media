  - type: Features
    data:
      - name: Points of Interest Discovery
        description: >-
          Discover tourist attractions, restaurants, museums, and nightlife
          venues near any geographic location with ranking scores.
      - name: Hotel Sentiment Ratings
        description: >-
          Access sentiment-based hotel ratings derived from thousands of
          traveler reviews covering all key aspects of the hotel experience.
      - name: Personalized Travel Recommendations
        description: >-
          Get AI-powered destination recommendations tailored to a traveler's
          origin and travel history patterns.
      - name: Location Scoring by Persona
        description: >-
          Score any neighborhood for specific traveler personas including
          Shoppers, Foodies, Nightlife Seekers, Sightseers, and Beach Lovers.
      - name: Rich Destination Content
        description: >-
          Combine POI data, hotel ratings, and location scores to create
          comprehensive destination guides and travel media content.
  - type: UseCases
    data:
      - name: Travel App Destination Guide
        description: >-
          Build destination guide features in travel apps showing attractions,
          restaurants, and nightlife with ratings and location context.
      - name: Hotel Comparison Platform
        description: >-
          Display sentiment-based ratings alongside hotel pricing to help
          travelers choose accommodation based on experience quality.
      - name: Personalized Travel Inspiration
        description: >-
          Power "where should I go next" features with personalized destination
          recommendations based on traveler history and preferences.
      - name: Neighborhood Explorer
        description: >-
          Help travelers understand the character of hotels or Airbnb locations
          using location scores for shopping, dining, and nightlife.
      - name: AI Travel Concierge
        description: >-
          Enable AI travel assistants to recommend attractions, rate hotels,
          and suggest destinations based on traveler interests.
  - type: Integrations
    data:
      - name: Amadeus Hotel Search
        description: >-
          Combine hotel ratings with hotel search results to display sentiment
          scores alongside pricing for better hotel selection.
      - name: Amadeus Hotel Content API
        description: >-
          Pair hotel ratings with property images and descriptions from the
          Hotel Content API for complete hotel profiles.
      - name: Amadeus Tours and Activities
        description: >-
          Extend POI discovery with bookable tours and activities from the
          Amadeus Tours and Activities API.
      - name: Amadeus City Search
        description: >-
          Use city search to identify destination cities before fetching POIs
          and travel recommendations for that location.
      - name: Amadeus Flight Inspiration Search
        description: >-
          Combine travel recommendations with flight inspiration search to
          suggest both destinations and available flights.
