aid: amadeus-traveler-media
url: >-
  https://raw.githubusercontent.com/api-evangelist/amadeus-traveler-media/refs/heads/main/apis.yml
name: Amadeus Traveler Media
tags:
  - Content
  - Destination
  - Media
  - Photos
  - Points of Interest
  - Tourism
  - Travel
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  The Amadeus Traveler Media APIs provide access to travel-related media and
  destination content, including photos, ratings, and information for points of
  interest, hotels, and destinations worldwide. These APIs power travel apps,
  destination guides, and travel planning platforms with rich content for tourist
  attractions, hotel sentiment ratings, travel recommendations, and location
  scoring.
created: '2024-01-01'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: amadeus-traveler-media:points-of-interest-api
    name: Points of Interest API
    description: >-
      The Amadeus Points of Interest API provides data on tourist attractions,
      restaurants, museums, nightlife, shopping, and parks near a specified
      location. Returns POI name, category, geographic coordinates, and ranking
      scores to help travelers discover what to do at a destination.
    humanURL: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/points-of-interest
    baseURL: https://test.api.amadeus.com/v1
    tags:
      - Destinations
      - Points of Interest
      - Tourism
      - Travel
    properties:
      - type: Documentation
        url: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/points-of-interest
      - type: APIReference
        url: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/points-of-interest/api-reference
      - type: OpenAPI
        url: openapi/amadeus-traveler-media-points-of-interest-openapi.yaml
  - aid: amadeus-traveler-media:hotel-ratings-api
    name: Hotel Ratings API
    description: >-
      The Amadeus Hotel Ratings API uses sentiment analysis of hotel reviews to
      provide overall hotel ratings and ratings for specific categories including
      location, comfort, service, staff, internet, food, facilities, pool, and
      sleep quality. Ratings help travelers make informed accommodation decisions.
    humanURL: https://developers.amadeus.com/self-service/category/hotels/api-doc/hotel-ratings
    baseURL: https://test.api.amadeus.com/v2
    tags:
      - Hotels
      - Ratings
      - Reviews
      - Sentiment
      - Travel
    properties:
      - type: Documentation
        url: https://developers.amadeus.com/self-service/category/hotels/api-doc/hotel-ratings
      - type: APIReference
        url: https://developers.amadeus.com/self-service/category/hotels/api-doc/hotel-ratings/api-reference
      - type: OpenAPI
        url: openapi/amadeus-traveler-media-hotel-ratings-openapi.yaml
  - aid: amadeus-traveler-media:travel-recommendations-api
    name: Travel Recommendations API
    description: >-
      The Amadeus Travel Recommendations API provides personalized destination
      recommendations based on a traveler's origin city and travel history.
      Returns top recommended cities with descriptions, scoring, and links to
      destination content to inspire future travel planning.
    humanURL: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/travel-recommendations
    baseURL: https://test.api.amadeus.com/v1
    tags:
      - Destinations
      - Recommendations
      - Tourism
      - Travel
    properties:
      - type: Documentation
        url: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/travel-recommendations
      - type: OpenAPI
        url: openapi/amadeus-traveler-media-travel-recommendations-openapi.yaml
  - aid: amadeus-traveler-media:location-score-api
    name: Location Score API
    description: >-
      The Amadeus Location Score API scores geographic locations for different
      traveler personas including Shopping, Restaurant, Nightlife, Sightseeing,
      and Beach. Helps travelers and travel apps understand the character of a
      neighborhood or destination for their travel style.
    humanURL: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/location-score
    baseURL: https://test.api.amadeus.com/v1
    tags:
      - Destinations
      - Location
      - Scoring
      - Tourism
      - Travel
    properties:
      - type: Documentation
        url: https://developers.amadeus.com/self-service/category/destination-experiences/api-doc/location-score
      - type: OpenAPI
        url: openapi/amadeus-traveler-media-location-score-openapi.yaml
